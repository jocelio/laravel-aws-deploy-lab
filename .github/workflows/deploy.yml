name: Deploy to EC2 via S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Create release artifact
        run: |
          zip -r release.zip . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "tests/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate version
        id: version
        run: echo "VERSION=release-${GITHUB_SHA}.zip" >> $GITHUB_OUTPUT

      - name: Upload to S3
        run: |
          aws s3 cp release.zip s3://${{ secrets.S3_BUCKET }}/releases/${{ steps.version.outputs.VERSION }}

      - name: Update latest pointer
        run: |
          echo "${{ steps.version.outputs.VERSION }}" > latest.txt
          aws s3 cp latest.txt s3://${{ secrets.S3_BUCKET }}/releases/latest.txt
